services:
  api:
    image: juanmurielc/logisticsanddeliveries_webapi:${IMAGE_TAG:-4.0.0}
    container_name: logistics_deliveries_api_container
    ports:
      - 9007:80
    environment:
      - ConnectionStrings__LogisticsAndDeliveriesDatabase=Server=db;Port=5432;Database=api_db;Username=api_user;Password=ApiPass123;Include Error Detail=true
    volumes:
      - api_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:13.22
    container_name: logistics_deliveries_db_container
    environment:
      - POSTGRES_USER=api_user
      - POSTGRES_PASSWORD=ApiPass123
      - POSTGRES_DB=api_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d api_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: logistics_deliveries_prometheus_container
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - 9090:9090
    volumes:
      - type: bind
        source: ./monitoring/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          create_host_path: false
      - prometheus_data:/prometheus
    depends_on:
      - api

  loki:
    image: grafana/loki:3.2.1
    container_name: logistics_deliveries_loki_container
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - 3100:3100
    volumes:
      - type: bind
        source: ./monitoring/loki-config.yml
        target: /etc/loki/local-config.yaml
        read_only: true
        bind:
          create_host_path: false
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    container_name: logistics_deliveries_promtail_container
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - type: bind
        source: ./monitoring/promtail-config.yml
        target: /etc/promtail/config.yml
        read_only: true
        bind:
          create_host_path: false
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

volumes:
  api_data:
  db_data:
  prometheus_data:
  loki_data: