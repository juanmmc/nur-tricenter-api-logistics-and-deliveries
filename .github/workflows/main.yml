name: Staging to VPS

on:
  push:
    tags:
    - stage-*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout files
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./docker-deploy/Dockerfile
          push: true
          tags: |
            juanmurielc/logisticsanddeliveries_webapi:${{ github.ref_name }}
            juanmurielc/logisticsanddeliveries_webapi:${{ github.sha }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout files
        uses: actions/checkout@v4
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: src/docker-compose.yml
          target: ${{ vars.DEPLOY_APP_DIR }}
          strip_components: 1
      - name: Deploy via SSH (docker compose with release tag)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ vars.DEPLOY_APP_DIR }}"
            cd "${{ vars.DEPLOY_APP_DIR }}"
            export IMAGE_TAG="${{ github.ref_name }}"
            docker compose -f docker-compose.yml pull api
            docker compose -f docker-compose.yml up -d --remove-orphans