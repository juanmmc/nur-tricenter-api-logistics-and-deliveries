name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (git pull + docker-compose up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            APP_DIR="${{ vars.DEPLOY_APP_DIR }}"
            REPO_URL="https://github.com/juanmmc/nur-tricenter-api-logistics-and-deliveries.git"
            DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d "nur-tricenter-api-logistics-and-deliveries/.git" ]; then
              rm -rf nur-tricenter-api-logistics-and-deliveries
              git clone "$REPO_URL"
            else
              cd nur-tricenter-api-logistics-and-deliveries
              git fetch --all --prune
              if [ -z "$DEFAULT_BRANCH" ]; then
                DEFAULT_BRANCH="$(git symbolic-ref --quiet --short refs/remotes/origin/HEAD | sed 's@^origin/@@')"
              fi
              git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
              git reset --hard "origin/$DEFAULT_BRANCH"
              cd ..
            fi

            # Deploy
            cd nur-tricenter-api-logistics-and-deliveries/src
            docker-compose up -d
